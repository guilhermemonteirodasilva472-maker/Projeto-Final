<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ações Práticas | O que você pode fazer</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/script.js"></script>
</head>
<body>
    <nav class="menu-navegacao">
        <a href="index.html">Cartaz</a>
        <a href="sobre.html">Sobre</a>
        <a href="acoes.html" class="ativo">Ações</a>
    </nav>

    <header>
        <div class="emoji-grande" role="img" aria-label="Checkmark">✅</div>
        <h1>Ações Práticas</h1>
        <p class="subtitulo">O que VOCÊ pode fazer para economizar água</p>
        </div>

        <main>
            <section>
                <h2></h2>
                <div class="lista-acoes" id="container-acoes">
                </div>
            </section>

            <section class="secao-cinza">
                <div class="container-central">
                    <h2>Quero fazer parte!</h2>
                    <form class="formulario" id="formulario-adesao" novalidate>
                        <label for="nome">Seu nome completo *</label>
                        <input type="text" id="nome" name="nome" required placeholder=" João Silva">

                        <label for="email">Seu e-mail *</label>
                        <input type="email" id="email" name="email" required placeholder=" joao@exemplo.com">

                        <button type="submit">Registrar minha adesão</button>
                    </form>
                </div>
            </section>
        </main>

        <footer>
            <p><strong>Equipe:</strong> Os Guardiões da Água</p>
            <p>Projeto Integrador • Liga STEAM / ArcelorMittal • 2026</p>
        </footer>
    </header>
